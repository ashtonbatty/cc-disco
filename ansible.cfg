[defaults]
inventory = inventory/hosts.yml
# Start conservative for mixed/legacy estates. Tune upward for larger environments.
forks = 25
# Disabled for automated discovery across large fleets.
# Re-enable in security-sensitive environments to prevent MITM attacks.
host_key_checking = False
timeout = 30
gathering = smart
fact_caching = jsonfile
fact_caching_connection = ./tmp/ansible_fact_cache
fact_caching_timeout = 3600
deprecation_warnings = True
stdout_callback = yaml

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=600s -o ServerAliveInterval=30
