---
# RHEL Server Discovery and Audit Playbook
#
# Gathers comprehensive facts from RHEL 6/7/8 servers for migration planning
# to RHEL 9/10. All tasks are read-only — nothing is modified on target hosts.
#
# Usage:
#   ansible-playbook gather_facts.yml
#   ansible-playbook gather_facts.yml --limit rhel8
#   ansible-playbook gather_facts.yml --tags selinux,network
#   ansible-playbook gather_facts.yml -e disco_mode=lightweight
#   ansible-playbook gather_facts.yml --tags deep_kernel
#
# Output: ./output/discovery_report.yml

- name: RHEL Server Discovery and Audit
  hosts: all
  # Full fact gathering is intentional — tasks rely on ansible_facts.packages,
  # ansible_facts.services, and hardware facts across multiple tag sections.
  gather_facts: true
  become: true

  vars:
    rhel_major: "{{ ansible_distribution_major_version }}"
    discovery_mode: "{{ disco_mode | default('full') }}"
    collect_deep_kernel: "{{ disco_collect_deep_kernel | default(discovery_mode != 'lightweight') | bool }}"
    collect_deep_filesystem: "{{ disco_collect_deep_filesystem | default(discovery_mode != 'lightweight') | bool }}"
    collect_deep_security: "{{ disco_collect_deep_security | default(discovery_mode != 'lightweight') | bool }}"
    collect_command_heavy_probes: "{{ disco_collect_command_heavy_probes | default(discovery_mode != 'lightweight') | bool }}"

  tasks:

    # Persist discovery controls into host facts so the report play can read
    # them from hostvars (play-level vars are not automatically available there).
    - name: Persist discovery controls as host facts
      ansible.builtin.set_fact:
        disco_discovery_mode: "{{ discovery_mode }}"
        disco_collect_deep_kernel: "{{ collect_deep_kernel }}"
        disco_collect_deep_filesystem: "{{ collect_deep_filesystem }}"
        disco_collect_deep_security: "{{ collect_deep_security }}"
        disco_collect_command_heavy_probes: "{{ collect_command_heavy_probes }}"
      tags: [always]

    # Pre-requisite fact collection — tagged for all sections that depend on them
    - name: Collect package facts for structured package analysis
      ansible.builtin.package_facts:
        manager: auto
      failed_when: false
      tags: [packages, readiness, apps]

    - name: Collect service facts for structured service analysis
      ansible.builtin.service_facts:
      failed_when: false
      tags: [services, network, firewall, readiness]

    - name: Import system tasks
      ansible.builtin.import_tasks: tasks/system.yml
    - name: Import SELinux tasks
      ansible.builtin.import_tasks: tasks/selinux.yml
    - name: Import identity tasks
      ansible.builtin.import_tasks: tasks/identity.yml
    - name: Import security tasks
      ansible.builtin.import_tasks: tasks/security.yml
    - name: Import platform tasks
      ansible.builtin.import_tasks: tasks/platform.yml
    - name: Import kernel tasks
      ansible.builtin.import_tasks: tasks/kernel.yml
    - name: Import network tasks
      ansible.builtin.import_tasks: tasks/network.yml
    - name: Import firewall tasks
      ansible.builtin.import_tasks: tasks/firewall.yml
    - name: Import services tasks
      ansible.builtin.import_tasks: tasks/services.yml
    - name: Import storage tasks
      ansible.builtin.import_tasks: tasks/storage.yml
    - name: Import packages tasks
      ansible.builtin.import_tasks: tasks/packages.yml
    - name: Import backup tasks
      ansible.builtin.import_tasks: tasks/backup.yml
    - name: Import satellite tasks
      ansible.builtin.import_tasks: tasks/satellite.yml
    - name: Import filesystem tasks
      ansible.builtin.import_tasks: tasks/filesystem.yml
    - name: Import readiness tasks
      ansible.builtin.import_tasks: tasks/readiness.yml
    - name: Import apps tasks
      ansible.builtin.import_tasks: tasks/apps.yml


# ==============================================================================
# Generate the combined YAML report
# ==============================================================================

- name: Generate discovery report
  hosts: all
  gather_facts: false
  become: false

  vars:
    output_dir: "./output"
    report_file: "{{ output_dir }}/discovery_report.yml"

  tasks:

    - name: Ensure output directory exists
      run_once: true
      delegate_to: localhost
      ansible.builtin.file:
        path: "{{ output_dir }}"
        state: directory
        mode: "0700"
      tags: [always]

    - name: Render consolidated discovery report
      run_once: true
      delegate_to: localhost
      ansible.builtin.template:
        src: templates/report.yml.j2
        dest: "{{ report_file }}"
        mode: "0600"
      vars:
        report_hosts: "{{ ansible_play_hosts_all | difference(['localhost']) }}"
      tags: [always]

    - name: Report location
      run_once: true
      delegate_to: localhost
      ansible.builtin.debug:
        msg: "Discovery report written to {{ report_file }}"
      tags: [always]
