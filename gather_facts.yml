---
# RHEL Server Discovery and Audit Playbook
#
# Gathers comprehensive facts from RHEL 6/7/8 servers for migration planning
# to RHEL 9/10. All tasks are read-only — nothing is modified on target hosts.
#
# Usage:
#   ansible-playbook gather_facts.yml
#   ansible-playbook gather_facts.yml --limit rhel8
#   ansible-playbook gather_facts.yml --tags selinux,network
#
# Output: ./output/discovery_report.yml

- name: RHEL Server Discovery and Audit
  hosts: all
  gather_facts: true
  become: true

  vars:
    rhel_major: "{{ ansible_distribution_major_version }}"

  tasks:

    - name: Collect package facts for structured package analysis
      ansible.builtin.package_facts:
        manager: auto
      failed_when: false
      tags: [packages, migration]

    - name: Collect service facts for structured service analysis
      ansible.builtin.service_facts:
      failed_when: false
      tags: [services, network, migration]

    # ==========================================================================
    # System Identity
    # ==========================================================================

    - name: Get RHEL release file
      ansible.builtin.slurp:
        src: /etc/redhat-release
      register: disco_redhat_release
      failed_when: false
      tags: [system]

    # ==========================================================================
    # SELinux
    # ==========================================================================

    - name: Get SELinux status
      ansible.builtin.command: sestatus
      register: disco_selinux_status
      changed_when: false
      failed_when: false
      tags: [selinux]

    - name: Get SELinux config file
      ansible.builtin.slurp:
        src: /etc/selinux/config
      register: disco_selinux_config
      failed_when: false
      tags: [selinux]

    # ==========================================================================
    # Identity / Domain Join
    # ==========================================================================

    - name: Get SSSD config
      ansible.builtin.slurp:
        src: /etc/sssd/sssd.conf
      register: disco_sssd_conf
      failed_when: false
      tags: [identity]

    - name: Get realm list
      ansible.builtin.command: realm list
      register: disco_realm_list
      changed_when: false
      failed_when: false
      tags: [identity]

    - name: Get krb5.conf
      ansible.builtin.slurp:
        src: /etc/krb5.conf
      register: disco_krb5_conf
      failed_when: false
      tags: [identity]

    - name: Check if host is domain-joined (keytab exists)
      ansible.builtin.stat:
        path: /etc/krb5.keytab
      register: disco_krb5_keytab
      failed_when: false
      tags: [identity]

    - name: Get nsswitch.conf
      ansible.builtin.slurp:
        src: /etc/nsswitch.conf
      register: disco_nsswitch_conf
      failed_when: false
      tags: [identity]

    # ==========================================================================
    # Security: sudoers, sshd, PAM
    # ==========================================================================

    - name: Get main sudoers file
      ansible.builtin.slurp:
        src: /etc/sudoers
      register: disco_sudoers_main
      failed_when: false
      tags: [security]

    - name: Find sudoers.d drop-in files
      ansible.builtin.find:
        paths: /etc/sudoers.d
        file_type: file
      register: disco_sudoers_d_files
      failed_when: false
      tags: [security]

    - name: Read each sudoers.d file
      ansible.builtin.slurp:
        src: "{{ item.path }}"
      loop: "{{ disco_sudoers_d_files.files | default([]) }}"
      register: disco_sudoers_d_contents
      failed_when: false
      tags: [security]

    - name: Get sshd_config
      ansible.builtin.slurp:
        src: /etc/ssh/sshd_config
      register: disco_sshd_config
      failed_when: false
      tags: [security]

    - name: Find sshd_config.d drop-ins (RHEL 8+)
      ansible.builtin.find:
        paths: /etc/ssh/sshd_config.d
        file_type: file
        patterns: "*.conf"
      register: disco_sshd_d_files
      failed_when: false
      tags: [security]

    - name: Read sshd_config.d drop-in files
      ansible.builtin.slurp:
        src: "{{ item.path }}"
      loop: "{{ disco_sshd_d_files.files | default([]) }}"
      register: disco_sshd_d_contents
      failed_when: false
      tags: [security]

    - name: Read key PAM configs
      ansible.builtin.slurp:
        src: "{{ item }}"
      loop:
        - /etc/pam.d/system-auth
        - /etc/pam.d/password-auth
        - /etc/pam.d/sshd
        - /etc/pam.d/su
      register: disco_pam_contents
      failed_when: false
      tags: [security]

    - name: Get crypto policies (RHEL 8+)
      ansible.builtin.command: update-crypto-policies --show
      register: disco_crypto_policy
      changed_when: false
      failed_when: false
      when: rhel_major | int >= 8
      tags: [security]

    # ==========================================================================
    # Platform Detection
    # ==========================================================================

    - name: Read DMI system vendor
      ansible.builtin.slurp:
        src: /sys/class/dmi/id/sys_vendor
      register: disco_dmi_vendor
      failed_when: false
      tags: [platform]

    - name: Read DMI product name
      ansible.builtin.slurp:
        src: /sys/class/dmi/id/product_name
      register: disco_dmi_product
      failed_when: false
      tags: [platform]

    - name: Check for AWS EC2 (IMDS)
      ansible.builtin.uri:
        url: http://169.254.169.254/latest/meta-data/instance-id
        timeout: 2
      register: disco_ec2_check
      failed_when: false
      tags: [platform]

    - name: Check for Azure VM (IMDS)
      ansible.builtin.uri:
        url: http://169.254.169.254/metadata/instance?api-version=2021-02-01
        headers:
          Metadata: "true"
        timeout: 2
      register: disco_azure_check
      failed_when: false
      tags: [platform]

    - name: Detect virtualisation via systemd-detect-virt
      ansible.builtin.command: systemd-detect-virt
      register: disco_virt_type
      changed_when: false
      failed_when: false
      tags: [platform]

    - name: Detect virtualisation via virt-what
      ansible.builtin.command: virt-what
      register: disco_virt_what
      changed_when: false
      failed_when: false
      tags: [platform]

    # ==========================================================================
    # Kernel, Modules, Boot
    # ==========================================================================

    - name: Get loaded kernel modules
      ansible.builtin.command: lsmod
      register: disco_lsmod
      changed_when: false
      failed_when: false
      tags: [kernel]

    - name: Detect third-party kernel modules
      # Module author/filepath correlation is not exposed by Ansible facts.
      ansible.builtin.shell: |
        set -o pipefail
        for mod in $(lsmod | awk 'NR>1{print $1}'); do
          info=$(modinfo "$mod" 2>/dev/null)
          filename=$(echo "$info" | grep -i '^filename:' | head -1 | awk '{print $2}')
          if echo "$filename" | grep -qv '/kernel/'; then
            author=$(echo "$info" | grep -i '^author:' | head -1 | sed 's/^author: *//')
            echo "${mod}|${filename}|${author}"
          fi
        done
      args:
        executable: /bin/bash
      register: disco_third_party_modules
      changed_when: false
      failed_when: false
      tags: [kernel]

    - name: Get date of last kernel update
      # Package install chronology for kernel NEVRAs is only available via rpm query output.
      ansible.builtin.shell: rpm -q --last kernel | head -1
      args:
        executable: /bin/bash
      register: disco_last_kernel_update
      changed_when: false
      failed_when: false
      tags: [kernel]

    - name: Check boot mode (UEFI vs BIOS)
      ansible.builtin.stat:
        path: /sys/firmware/efi
      register: disco_efi_dir
      failed_when: false
      tags: [kernel]

    - name: Get GRUB defaults
      ansible.builtin.slurp:
        src: /etc/default/grub
      register: disco_grub_defaults
      failed_when: false
      tags: [kernel]

    - name: Check for deprecated kernel modules
      # Deprecated module detection requires policy matching against loaded module names.
      ansible.builtin.shell: |
        set -o pipefail
        lsmod | awk 'NR>1{print $1}' | while read mod; do
          case "$mod" in
            floppy|mptbase|mptscsih|mptspi|megaraid|aacraid|3w-9xxx|3w-sas)
              echo "deprecated:$mod"
              ;;
          esac
        done
      args:
        executable: /bin/bash
      register: disco_deprecated_modules
      changed_when: false
      failed_when: false
      tags: [kernel]

    # ==========================================================================
    # Networking
    # ==========================================================================

    - name: Get routing table
      ansible.builtin.command: ip route show
      register: disco_routes
      changed_when: false
      failed_when: false
      tags: [network]

    - name: Get resolv.conf
      ansible.builtin.slurp:
        src: /etc/resolv.conf
      register: disco_resolv_conf
      failed_when: false
      tags: [network]

    - name: Determine NetworkManager state from service facts
      ansible.builtin.set_fact:
        disco_nm_active:
          stdout: >-
            {{
              ansible_facts.services['NetworkManager.service'].state
              if 'NetworkManager.service' in (ansible_facts.services | default({}))
              else (
                ansible_facts.services['NetworkManager'].state
                if 'NetworkManager' in (ansible_facts.services | default({}))
                else 'not found'
              )
            }}
      tags: [network]

    - name: Get NetworkManager connection profiles
      ansible.builtin.command: nmcli -t connection show
      register: disco_nmcli_connections
      changed_when: false
      failed_when: false
      tags: [network]

    - name: Check for network bonding
      # /proc/net/bonding is kernel-generated and not normalized by Ansible facts.
      ansible.builtin.shell: ls /proc/net/bonding/ 2>/dev/null
      register: disco_bond_interfaces
      changed_when: false
      failed_when: false
      tags: [network]

    - name: Get bond details
      # Bond mode/slave details are only available in /proc/net/bonding/* text files.
      ansible.builtin.shell: cat /proc/net/bonding/* 2>/dev/null
      register: disco_bond_details
      changed_when: false
      failed_when: false
      when: disco_bond_interfaces.stdout | default('') | length > 0
      tags: [network]

    - name: Check for network teaming
      # teamdctl state data has no equivalent Ansible fact/module on RHEL 6/7/8.
      ansible.builtin.shell: |
        set -o pipefail
        command -v teamdctl >/dev/null 2>&1 || { echo "teamdctl not found"; exit 0; }
        command -v ip >/dev/null 2>&1 || { echo "ip not found"; exit 0; }
        teamdctl -h >/dev/null 2>&1 && \
        for dev in $(ip -o link show type team 2>/dev/null | awk -F': ' '{print $2}'); do
          echo "=== $dev ==="
          teamdctl "$dev" state
        done
      args:
        executable: /bin/bash
      register: disco_team_details
      changed_when: false
      failed_when: false
      tags: [network]

    - name: List network-scripts ifcfg files
      ansible.builtin.find:
        paths: /etc/sysconfig/network-scripts
        patterns: "ifcfg-*"
        file_type: file
      register: disco_ifcfg_files
      failed_when: false
      tags: [network]

    # ==========================================================================
    # Firewall
    # ==========================================================================

    - name: Check if firewalld is active
      ansible.builtin.command: systemctl is-active firewalld
      register: disco_firewalld_active
      changed_when: false
      failed_when: false
      tags: [firewall]

    - name: Get firewalld zones and rules
      # Zone/rich-rule dump requires firewall-cmd textual output.
      ansible.builtin.shell: |
        set -o pipefail
        command -v firewall-cmd >/dev/null 2>&1 || { echo "firewall-cmd not found"; exit 0; }
        firewall-cmd --list-all-zones 2>/dev/null
      args:
        executable: /bin/bash
      register: disco_firewalld_zones
      changed_when: false
      failed_when: false
      when: disco_firewalld_active.stdout | default('') == 'active'
      tags: [firewall]

    - name: Check if iptables service is active
      # Mixed systemd/sysv service status fallback is required for older releases.
      ansible.builtin.shell: |
        set -o pipefail
        if command -v systemctl >/dev/null 2>&1; then
          systemctl is-active iptables 2>/dev/null && exit 0
        fi
        if command -v service >/dev/null 2>&1; then
          service iptables status 2>/dev/null | head -1 && exit 0
        fi
        echo "not found"
      args:
        executable: /bin/bash
      register: disco_iptables_active
      changed_when: false
      failed_when: false
      tags: [firewall]

    - name: Get iptables rules
      ansible.builtin.command: iptables -L -n -v
      register: disco_iptables_rules
      changed_when: false
      failed_when: false
      tags: [firewall]

    - name: Get nftables rules (RHEL 8+)
      ansible.builtin.command: nft list ruleset
      register: disco_nftables_rules
      changed_when: false
      failed_when: false
      when: rhel_major | int >= 8
      tags: [firewall]

    # ==========================================================================
    # Init System and Services
    # ==========================================================================

    - name: Detect init system
      ansible.builtin.set_fact:
        disco_init_system:
          stdout: "{{ 'systemd' if ansible_service_mgr | default('') == 'systemd' else 'sysvinit' }}"
      changed_when: false
      failed_when: false
      tags: [services]

    - name: Build enabled and running service lists from service facts
      ansible.builtin.set_fact:
        disco_systemd_enabled:
          stdout: |
            {% for svc_name, svc in (ansible_facts.services | default({})) | dictsort %}
            {% if svc.status | default('') == 'enabled' %}{{ svc_name }}{% endif %}
            {% endfor %}
        disco_systemd_running:
          stdout: |
            {% for svc_name, svc in (ansible_facts.services | default({})) | dictsort %}
            {% if svc.state | default('') == 'running' %}{{ svc_name }}{% endif %}
            {% endfor %}
      tags: [services]

    - name: Get chkconfig services (sysvinit)
      # SysV chkconfig listing has no cross-version fact replacement.
      ansible.builtin.command: chkconfig --list
      register: disco_chkconfig
      changed_when: false
      failed_when: false
      when: disco_init_system.stdout | default('') != 'systemd'
      tags: [services]

    - name: Get tuned profile
      ansible.builtin.command: tuned-adm active
      register: disco_tuned_profile
      changed_when: false
      failed_when: false
      tags: [services]

    # ==========================================================================
    # Storage
    # ==========================================================================

    - name: Get LVM physical volumes
      ansible.builtin.command: pvs --noheadings --nosuffix --units g -o pv_name,vg_name,pv_size,pv_free
      register: disco_pvs
      changed_when: false
      failed_when: false
      tags: [storage]

    - name: Get LVM volume groups
      ansible.builtin.command: vgs --noheadings --nosuffix --units g -o vg_name,vg_size,vg_free,lv_count,pv_count
      register: disco_vgs
      changed_when: false
      failed_when: false
      tags: [storage]

    - name: Get LVM logical volumes
      ansible.builtin.command: lvs --noheadings --nosuffix --units g -o lv_name,vg_name,lv_size,lv_attr
      register: disco_lvs
      changed_when: false
      failed_when: false
      tags: [storage]

    - name: Build disk usage summary from mount facts
      ansible.builtin.set_fact:
        disco_df:
          stdout: |
            {% for mount in ansible_mounts | default([]) %}
            {{ mount.mount }}|{{ mount.fstype }}|{{ mount.device }}|{{ mount.size_total | default(0) }}|{{ mount.size_available | default(0) }}
            {% endfor %}
      tags: [storage]

    - name: Get block devices
      ansible.builtin.command: lsblk -o NAME,SIZE,TYPE,FSTYPE,MOUNTPOINT -n
      register: disco_lsblk
      changed_when: false
      failed_when: false
      tags: [storage]

    - name: Get fstab
      ansible.builtin.slurp:
        src: /etc/fstab
      register: disco_fstab
      failed_when: false
      tags: [storage]

    - name: Get multipath config
      ansible.builtin.command: multipath -ll
      register: disco_multipath
      changed_when: false
      failed_when: false
      tags: [storage]

    - name: Get NFS/CIFS mounts from mount facts
      ansible.builtin.set_fact:
        disco_nfs_mounts:
          stdout: |
            {% for mount in ansible_mounts | default([]) if mount.fstype in ['nfs', 'nfs4', 'cifs', 'smbfs'] %}
            {{ mount.mount }} {{ mount.device }} {{ mount.fstype }} {{ mount.options | default('') }}
            {% endfor %}
      tags: [storage]

    # ==========================================================================
    # Package Management and Repos
    # ==========================================================================

    - name: Get installed package count from package facts
      ansible.builtin.set_fact:
        disco_pkg_count:
          stdout: "{{ (ansible_facts.packages | default({})) | length }}"
      tags: [packages]

    - name: Build non-Red Hat package list from package facts
      ansible.builtin.set_fact:
        disco_non_rh_packages:
          stdout_lines: []
      changed_when: false
      tags: [packages]

    - name: Append non-Red Hat package output lines
      ansible.builtin.set_fact:
        disco_non_rh_packages:
          stdout_lines: "{{ disco_non_rh_packages.stdout_lines + [item.key ~ '|' ~ (item.value.0.vendor | default('unknown')) ~ '|' ~ (item.value.0.version | default('unknown') ~ '-' ~ item.value.0.release | default('') ~ '.' ~ item.value.0.arch | default('unknown'))] }}"
      loop: "{{ (ansible_facts.packages | default({})) | dict2items }}"
      when:
        - item.key != 'gpg-pubkey'
        - (item.value.0.vendor | default('')) is not search('(?i)Red Hat')
      changed_when: false
      tags: [packages]

    - name: Get yum/dnf versionlocks
      # versionlock plugin output is command-specific and not exposed via Ansible facts.
      ansible.builtin.shell: |
        set -o pipefail
        if command -v dnf >/dev/null 2>&1; then
          dnf versionlock list 2>/dev/null || echo "versionlock plugin not installed"
        elif command -v yum >/dev/null 2>&1; then
          yum versionlock list 2>/dev/null || echo "versionlock plugin not installed"
        else
          echo "dnf/yum not found"
        fi
      args:
        executable: /bin/bash
      register: disco_versionlocks
      changed_when: false
      failed_when: false
      tags: [packages]

    - name: Get enabled repos
      # Repo enablement details are sourced from yum/dnf CLI; no unified built-in fact exists.
      ansible.builtin.shell: |
        set -o pipefail
        if command -v dnf >/dev/null 2>&1; then
          dnf repolist enabled 2>/dev/null
        elif command -v yum >/dev/null 2>&1; then
          yum repolist enabled 2>/dev/null
        else
          echo "dnf/yum not found"
        fi
      args:
        executable: /bin/bash
      register: disco_repos_enabled
      changed_when: false
      failed_when: false
      tags: [packages]

    - name: Detect non-satellite repos
      # Parsing repo file key/value content has no direct module output for this exact schema.
      ansible.builtin.shell: |
        set -o pipefail
        for f in /etc/yum.repos.d/*.repo; do
          [ -f "$f" ] || continue
          if grep -qE '^\s*(baseurl|mirrorlist|metalink)\s*=' "$f" 2>/dev/null; then
            if ! grep -qiE 'satellite|capsule|katello|cdn\.redhat\.com' "$f" 2>/dev/null; then
              echo "$f"
              grep -E '^\s*(name|baseurl|mirrorlist|metalink)\s*=' "$f"
              echo "---"
            fi
          fi
        done
      args:
        executable: /bin/bash
      register: disco_non_satellite_repos
      changed_when: false
      failed_when: false
      tags: [packages]

    # ==========================================================================
    # Backup and Monitoring Agents
    # ==========================================================================

    - name: Detect backup and monitoring agents
      # Agent footprint checks are path-based heuristics and not exposed as module facts.
      ansible.builtin.shell: |
        set -o pipefail
        found=""
        [ -e /usr/openv/netbackup/bin/bpclntcmd ] && found="${found}netbackup\n"
        [ -d /opt/commvault ] && found="${found}commvault\n"
        [ -e /opt/tivoli/tsm/client/ba/bin/dsmc ] && found="${found}tsm_spectrum_protect\n"
        [ -d /opt/veeamapp ] && found="${found}veeam\n"
        [ -d /opt/rubrik ] && found="${found}rubrik\n"
        [ -d /opt/cohesity ] && found="${found}cohesity\n"
        [ -e /etc/zabbix/zabbix_agentd.conf ] && found="${found}zabbix\n"
        [ -e /etc/nagios/nrpe.cfg ] && found="${found}nagios_nrpe\n"
        [ -d /opt/splunkforwarder ] && found="${found}splunk\n"
        [ -d /etc/datadog-agent ] && found="${found}datadog\n"
        [ -d /opt/CrowdStrike ] && found="${found}crowdstrike\n"
        [ -d /usr/local/qualys ] && found="${found}qualys\n"
        [ -d /opt/Tanium ] && found="${found}tanium\n"
        [ -d /opt/bacula ] && found="${found}bacula\n"
        [ -d /opt/amanda ] && found="${found}amanda\n"
        printf "$found"
      args:
        executable: /bin/bash
      register: disco_backup_monitoring
      changed_when: false
      failed_when: false
      tags: [backup]

    # ==========================================================================
    # Satellite / Subscription
    # ==========================================================================

    - name: Get subscription-manager identity
      ansible.builtin.command: subscription-manager identity
      register: disco_sub_identity
      changed_when: false
      failed_when: false
      tags: [satellite]

    - name: Get subscription-manager status
      ansible.builtin.command: subscription-manager status
      register: disco_sub_status
      changed_when: false
      failed_when: false
      tags: [satellite]

    - name: Get Satellite server from rhsm.conf
      # Extracting specific rhsm.conf keys is easiest via targeted regex parse.
      ansible.builtin.shell: |
        set -o pipefail
        [ -f /etc/rhsm/rhsm.conf ] || { echo "rhsm.conf missing"; exit 0; }
        grep -E '^\s*(hostname|baseurl)' /etc/rhsm/rhsm.conf 2>/dev/null || echo "none"
      args:
        executable: /bin/bash
      register: disco_satellite_server
      changed_when: false
      failed_when: false
      tags: [satellite]

    - name: Get katello/satellite packages
      # Pattern-based package name matching uses rpm query text.
      ansible.builtin.shell: |
        set -o pipefail
        command -v rpm >/dev/null 2>&1 || { echo "rpm not found"; exit 0; }
        rpm -qa | grep -iE 'katello|satellite|gofer' || echo "none"
      args:
        executable: /bin/bash
      register: disco_katello_info
      changed_when: false
      failed_when: false
      tags: [satellite]

    # ==========================================================================
    # Filesystem Exploration
    # ==========================================================================

    - name: List /opt subdirectories
      ansible.builtin.find:
        paths: /opt
        file_type: directory
        recurse: false
      register: disco_opt_listing
      failed_when: false
      tags: [filesystem]

    - name: List /data subdirectories
      ansible.builtin.find:
        paths: /data
        file_type: directory
        recurse: false
      register: disco_data_listing
      failed_when: false
      tags: [filesystem]

    - name: Check third-party software in common paths
      # This is a bespoke directory inventory across multiple optional roots.
      ansible.builtin.shell: |
        set -o pipefail
        for d in /opt /usr/local/bin /usr/local/sbin /app /apps /software; do
          if [ -d "$d" ]; then
            listing=$(ls -1 "$d" 2>/dev/null)
            if [ -n "$listing" ]; then
              echo "=== ${d} ==="
              echo "$listing"
            fi
          fi
        done
      args:
        executable: /bin/bash
      register: disco_third_party_paths
      changed_when: false
      failed_when: false
      tags: [filesystem]

    # ==========================================================================
    # RHEL 9/10 Migration Readiness
    # ==========================================================================

    - name: Get Python versions
      # Python interpreter discovery across legacy paths requires command probing.
      ansible.builtin.shell: |
        set -o pipefail
        if command -v python >/dev/null 2>&1; then
          echo "python:$(python --version 2>&1)"
        else
          echo "python:not found"
        fi
        if command -v python2 >/dev/null 2>&1; then
          echo "python2:$(python2 --version 2>&1)"
        else
          echo "python2:not found"
        fi
        if command -v python3 >/dev/null 2>&1; then
          echo "python3:$(python3 --version 2>&1)"
        else
          echo "python3:not found"
        fi
        if [ -x /usr/libexec/platform-python ]; then
          echo "platform-python:$(/usr/libexec/platform-python --version 2>&1)"
        else
          echo "platform-python:not found"
        fi
      args:
        executable: /bin/bash
      register: disco_python_versions
      changed_when: false
      failed_when: false
      tags: [migration]

    - name: Build 32-bit package list from package facts
      ansible.builtin.set_fact:
        disco_32bit_packages:
          stdout_lines: []
      changed_when: false
      tags: [migration]

    - name: Append 32-bit package entries
      ansible.builtin.set_fact:
        disco_32bit_packages:
          stdout_lines: "{{ disco_32bit_packages.stdout_lines + [item.key ~ '-' ~ item.value.0.version ~ '-' ~ item.value.0.release ~ '.' ~ item.value.0.arch] }}"
      loop: "{{ (ansible_facts.packages | default({})) | dict2items }}"
      when: item.value.0.arch | default('') is match('i[36]86')
      changed_when: false
      tags: [migration]

    - name: Build deprecated package list from package facts
      ansible.builtin.set_fact:
        disco_deprecated_packages:
          stdout_lines: []
      changed_when: false
      tags: [migration]

    - name: Append deprecated package entries
      ansible.builtin.set_fact:
        disco_deprecated_packages:
          stdout_lines: "{{ disco_deprecated_packages.stdout_lines + [item] }}"
      loop:
        - ntp
        - sendmail
        - vsftpd
        - xinetd
        - talk
        - ypserv
        - ypbind
        - iptables-services
        - net-tools
      when: item in (ansible_facts.packages | default({}))
      changed_when: false
      tags: [migration]

    - name: Build chronyd vs ntpd status from service facts
      ansible.builtin.set_fact:
        disco_time_services:
          stdout: |
            ntpd:{{ ansible_facts.services['ntpd.service'].state if 'ntpd.service' in (ansible_facts.services | default({})) else 'not found' }}
            chronyd:{{ ansible_facts.services['chronyd.service'].state if 'chronyd.service' in (ansible_facts.services | default({})) else 'not found' }}
      changed_when: false
      tags: [migration]

    - name: Check for xinetd services
      ansible.builtin.find:
        paths: /etc/xinetd.d
        file_type: file
        recurse: false
      register: disco_xinetd
      failed_when: false
      tags: [migration]

    - name: Check legacy network config vs NetworkManager
      ansible.builtin.set_fact:
        disco_legacy_network:
          stdout: "ifcfg_count:{{ disco_ifcfg_files.matched | default(0) }},nm_status:{{ disco_nm_active.stdout | default('inactive') }}"
      changed_when: false
      failed_when: false
      tags: [migration]

    - name: Check for NFS/CIFS fstab entries and deprecated mount options
      # Exact option detection in /etc/fstab requires line-oriented regex parsing.
      ansible.builtin.shell: |
        set -o pipefail
        [ -f /etc/fstab ] || { echo "none found"; exit 0; }
        grep -E 'nfs|cifs|ext[23]|_netdev' /etc/fstab 2>/dev/null || echo "none found"
      args:
        executable: /bin/bash
      register: disco_fstab_concerns
      changed_when: false
      failed_when: false
      tags: [migration]

    - name: Get OpenSSL version
      ansible.builtin.command: openssl version
      register: disco_openssl_version
      changed_when: false
      failed_when: false
      tags: [migration]

    - name: Get root crontab
      ansible.builtin.command: crontab -l
      register: disco_root_crontab
      changed_when: false
      failed_when: false
      tags: [migration]

    - name: Get system crontab
      ansible.builtin.slurp:
        src: /etc/crontab
      register: disco_system_crontab
      failed_when: false
      tags: [migration]

    - name: List cron.d entries
      ansible.builtin.find:
        paths: /etc/cron.d
        file_type: file
        recurse: false
      register: disco_cron_d
      failed_when: false
      tags: [migration]

    # ==========================================================================
    # Common application detection
    # ==========================================================================

    - name: Build common server application list from package facts
      ansible.builtin.set_fact:
        disco_common_apps:
          stdout_lines: []
      changed_when: false
      tags: [migration]

    - name: Append detected common server applications
      ansible.builtin.set_fact:
        disco_common_apps:
          stdout_lines: "{{ disco_common_apps.stdout_lines + [item] }}"
      loop:
        - httpd
        - nginx
        - mysql-server
        - mariadb-server
        - postgresql-server
        - tomcat
        - docker
        - podman
      when: item in (ansible_facts.packages | default({}))
      changed_when: false
      tags: [migration]

    - name: Append java and oracle preinstall package detections
      ansible.builtin.set_fact:
        disco_common_apps:
          stdout_lines: "{{ disco_common_apps.stdout_lines + ([item] if item not in disco_common_apps.stdout_lines else []) }}"
      loop: "{{ (ansible_facts.packages | default({})) | dict2items | map(attribute='key') | list }}"
      when: item is match('^java-.*-openjdk$|^oracle-database-preinstall.*$')
      changed_when: false
      tags: [migration]


# ==============================================================================
# Generate the combined YAML report
# ==============================================================================

- name: Generate discovery report
  hosts: all
  gather_facts: false

  vars:
    output_dir: "./output"
    report_file: "{{ output_dir }}/discovery_report.yml"

  tasks:

    - name: Ensure output directory exists
      run_once: true
      delegate_to: localhost
      ansible.builtin.file:
        path: "{{ output_dir }}"
        state: directory
        mode: "0755"

    - name: Render consolidated discovery report
      run_once: true
      delegate_to: localhost
      ansible.builtin.template:
        src: templates/report.yml.j2
        dest: "{{ report_file }}"
        mode: "0644"
      vars:
        report_hosts: "{{ ansible_play_hosts_all | difference(['localhost']) }}"

    - name: Report location
      run_once: true
      delegate_to: localhost
      ansible.builtin.debug:
        msg: "Discovery report written to {{ report_file }}"
