---
# RHEL Server Discovery Inventory
#
# Populate with your actual hosts. Group by RHEL major version so the playbook
# can apply version-specific logic. You can also add hosts to multiple groups.
#
# Usage:
#   ansible-playbook gather_facts.yml                        # all hosts
#   ansible-playbook gather_facts.yml --limit rhel8          # only RHEL 8
#   ansible-playbook gather_facts.yml --limit server1.example.com

all:
  children:
    rhel6:
      hosts:
        # server1.example.com:
        #   ansible_host: 10.0.1.10
        # server2.example.com:
        #   ansible_host: 10.0.1.11
      vars:
        # RHEL 6 ships Python 2.6. Ansible >= 2.12 requires Python 2.7+.
        # If running Ansible 2.12+, install Python 2.7 from SCL on these hosts,
        # or use Ansible 2.11.
        ansible_python_interpreter: /usr/bin/python2.6
        # Disable pipelining on RHEL 6 if sudoers has "Defaults requiretty"
        ansible_ssh_pipelining: false

    rhel7:
      hosts:
        # server3.example.com:
        #   ansible_host: 10.0.2.10
        # server4.example.com:
        #   ansible_host: 10.0.2.11
      vars:
        ansible_python_interpreter: /usr/bin/python2

    rhel8:
      hosts:
        # server5.example.com:
        #   ansible_host: 10.0.3.10
        # server6.example.com:
        #   ansible_host: 10.0.3.11
      vars:
        ansible_python_interpreter: /usr/libexec/platform-python

  vars:
    # Common connection settings
    ansible_user: ansible_svc
    # ansible_ssh_private_key_file: ~/.ssh/id_rsa
    # ansible_port: 22
