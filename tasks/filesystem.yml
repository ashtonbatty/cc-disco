---
# Filesystem Exploration

- name: List /opt subdirectories
  ansible.builtin.find:
    paths: /opt
    file_type: directory
    recurse: false
  register: disco_opt_listing
  failed_when: false
  when: collect_deep_filesystem | bool
  tags: [filesystem, deep_filesystem]

- name: List /data subdirectories
  ansible.builtin.find:
    paths: /data
    file_type: directory
    recurse: false
  register: disco_data_listing
  failed_when: false
  when: collect_deep_filesystem | bool
  tags: [filesystem, deep_filesystem]

- name: Check third-party software in common paths
  # This is a bespoke directory inventory across multiple optional roots.
  ansible.builtin.shell: |
    for d in /usr/local/bin /usr/local/sbin /app /apps /software; do
      if [ -d "$d" ]; then
        listing=$(ls -1 "$d" 2>/dev/null)
        if [ -n "$listing" ]; then
          echo "=== ${d} ==="
          echo "$listing"
        fi
      fi
    done
  args:
    executable: /bin/bash
  register: disco_third_party_paths
  changed_when: false
  failed_when: false
  when: (collect_deep_filesystem | bool) and (collect_command_heavy_probes | bool)
  tags: [filesystem, deep_filesystem]
