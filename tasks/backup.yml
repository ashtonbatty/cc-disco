---
# Backup and Monitoring Agents

- name: Detect backup and monitoring agents
  # Agent footprint checks are path-based heuristics and not exposed as module facts.
  ansible.builtin.shell: |
    set -o pipefail
    [ -e /usr/openv/netbackup/bin/bpclntcmd ] && printf '%s\n' "netbackup"
    [ -d /opt/commvault ] && printf '%s\n' "commvault"
    [ -e /opt/tivoli/tsm/client/ba/bin/dsmc ] && printf '%s\n' "tsm_spectrum_protect"
    [ -d /opt/veeamapp ] && printf '%s\n' "veeam"
    [ -d /opt/rubrik ] && printf '%s\n' "rubrik"
    [ -d /opt/cohesity ] && printf '%s\n' "cohesity"
    [ -e /etc/zabbix/zabbix_agentd.conf ] && printf '%s\n' "zabbix"
    [ -e /etc/nagios/nrpe.cfg ] && printf '%s\n' "nagios_nrpe"
    [ -d /opt/splunkforwarder ] && printf '%s\n' "splunk"
    [ -d /etc/datadog-agent ] && printf '%s\n' "datadog"
    [ -d /opt/CrowdStrike ] && printf '%s\n' "crowdstrike"
    [ -d /usr/local/qualys ] && printf '%s\n' "qualys"
    [ -d /opt/Tanium ] && printf '%s\n' "tanium"
    [ -d /opt/bacula ] && printf '%s\n' "bacula"
    [ -d /opt/amanda ] && printf '%s\n' "amanda"
  args:
    executable: /bin/bash
  register: disco_backup_monitoring
  changed_when: false
  failed_when: false
  tags: [backup]
